<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#0b0d10"/>
  <!-- Chandeliers (dans la zone de sécurité centrale ~80% pour le maskable) -->
  <g stroke="#ffb000" stroke-width="14" stroke-linecap="round">
    <!-- bougie 1 -->
    <line x1="150" y1="150" x2="150" y2="360"/>
    <rect x="128" y="210" width="44" height="110" rx="6" fill="#ffb000" stroke="none"/>
    <!-- bougie 2 (plus haute) -->
    <line x1="256" y1="120" x2="256" y2="392"/>
    <rect x="234" y="170" width="44" height="150" rx="6" fill="#12161b" stroke="#ffb000" stroke-width="10"/>
    <!-- bougie 3 -->
    <line x1="362" y1="170" x2="362" y2="340"/>
    <rect x="340" y="200" width="44" height="90" rx="6" fill="#ffb000" stroke="none"/>
  </g>
  <!-- ligne de tendance -->
  <polyline points="120,330 200,270 300,300 400,190" fill="none" stroke="#ffb000" stroke-width="10" stroke-linejoin="round" stroke-linecap="round" opacity="0.5"/>
</svg>
